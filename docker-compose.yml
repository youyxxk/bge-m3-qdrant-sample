services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    container_name: rag-service
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=products
      - MODEL_NAME=BAAI/bge-m3
      - USE_FP16=true
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
